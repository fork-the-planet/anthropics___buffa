name: Publish to crates.io

# Publishes all workspace crates to crates.io in dependency order.
#
# Auth: uses the CARGO_REGISTRY_TOKEN secret when present (bootstrap path —
# crates.io can't configure Trusted Publishing for a crate that doesn't exist
# yet), otherwise exchanges the GitHub OIDC token for a short-lived crates.io
# token. Once Trusted Publishing is configured per crate and the secret is
# removed, publishes run entirely over OIDC with no stored credentials.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          Run cargo publish --dry-run (no upload, no auth). Note: only the
          leaf crate (buffa) fully verifies — downstream crates resolve deps
          from crates.io, not the workspace, so they fail verification until
          buffa is actually published. That failure is expected.
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # OIDC for crates.io Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    # GitHub Environment: part of the Trusted Publishing trust config on
    # crates.io, and lets you add a required-reviewer approval gate.
    environment: crates-io
    env:
      DRY_RUN_FLAG: ${{ inputs.dry_run && '--dry-run' || '' }}
      # Bootstrap token. Empty if secret is unset → Trusted Publishing path.
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    env:
      # Dependency order — see the comment above the coverage check.
      PUBLISH_ORDER: >-
        buffa
        buffa-descriptor
        buffa-types
        buffa-codegen
        buffa-build
        buffa-remote-derive
        protoc-gen-buffa
        protoc-gen-buffa-packaging

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # OIDC token exchange. Skipped in dry-run (never hits crates.io) and
      # bootstrap (secret present). The action's post-step revokes the token.
      - name: Authenticate (Trusted Publishing)
        id: auth
        if: ${{ !inputs.dry_run && env.CARGO_REGISTRY_TOKEN == '' }}
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4 (sha-pinned)

      - name: Use Trusted Publishing token
        if: ${{ steps.auth.outputs.token != '' }}
        run: echo "CARGO_REGISTRY_TOKEN=${{ steps.auth.outputs.token }}" >> "$GITHUB_ENV"

      # PUBLISH_ORDER is the single source of truth for what ships and in what
      # order. Order is dependency order and is hand-maintained: cargo publish
      # (≥1.66) blocks until the crate is indexed, so a sequential walk works
      # without manual delays. buffa-descriptor must precede buffa-types,
      # because buffa-types' `reflect` feature has an optional buffa-descriptor
      # dependency and cargo publish requires optional deps to resolve from the
      # index too.
      #
      # The coverage check below fails the run if a publishable workspace member
      # is missing from the list. buffa-remote-derive shipped in 0.9.0 announced
      # in the changelog but absent from crates.io because this list was
      # hand-written and nobody added it, and the release passed green — a new
      # crate must never be able to be skipped silently again. Adding a crate to
      # the workspace now either adds it here or breaks the release loudly.
      #
      # Each step is idempotent: if the crate is already published at this
      # version, the step logs a notice and succeeds. Re-running the workflow
      # after a partial failure skips what's done and picks up where it left
      # off. No manual edit-and-rerun needed.

      - name: Create idempotent publish helper
        run: |
          cat > /tmp/publish.sh << 'EOF'
          #!/bin/bash
          set -o pipefail
          crate="$1"; shift
          cargo publish -p "$crate" "$@" 2>&1 | tee /tmp/publish.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ] && grep -qE "already (exists|uploaded)" /tmp/publish.log; then
            echo "::notice::$crate already published at this version; skipping"
            exit 0
          fi
          exit $status
          EOF
          chmod +x /tmp/publish.sh

      - name: Check every publishable crate is covered
        run: |
          set -euo pipefail
          # publish == null means the manifest does not set publish = false.
          cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.publish == null) | .name' \
            | sort > /tmp/publishable.txt
          printf '%s\n' $PUBLISH_ORDER | sort > /tmp/listed.txt
          if ! diff -u /tmp/publishable.txt /tmp/listed.txt; then
            echo "::error::PUBLISH_ORDER does not match the publishable workspace members."
            echo "::error::A crate on the left is publishable but would not be published;"
            echo "::error::add it to PUBLISH_ORDER in dependency order, or set publish = false"
            echo "::error::in its Cargo.toml if it is deliberately not released."
            exit 1
          fi
          echo "::notice::$(wc -l < /tmp/listed.txt) publishable crates, all covered"

      - name: Publish
        run: |
          set -euo pipefail
          for crate in $PUBLISH_ORDER; do
            echo "::group::publish $crate"
            /tmp/publish.sh "$crate" $DRY_RUN_FLAG
            echo "::endgroup::"
          done
