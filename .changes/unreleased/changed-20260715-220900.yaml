kind: Changed
body: 'Packed fixed-width payloads (fixed32/sfixed32/float, fixed64/sfixed64/double) now decode in one bulk call (`buffa::types::extend_packed_*`): the payload length is validated against the element width up front, the exact element count is reserved, and elements convert via `chunks_exact` + `from_le_bytes`, which optimizes to a bulk copy on little-endian targets. Applies to view decode and to owned decode into the default `Vec` when the payload is contiguous in the current chunk; fragmented buffers and custom list representations keep the per-element loop. Behavior note: on those bulk paths a misaligned (truncated) packed payload now fails without partially extending the field — previously the leading complete elements were pushed before the error; the error itself is unchanged (`DecodeError::UnexpectedEof`), and the per-element fallback paths keep the old partial-extension behavior.'
