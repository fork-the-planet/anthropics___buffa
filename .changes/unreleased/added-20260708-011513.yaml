kind: Added
body: '**Path-scoped editions feature overrides** via `override_feature_in(path, FeatureOverride)` — descriptor feature injection for integrators working with protos they cannot modify, applied as if the proto had been migrated to editions with that feature set at the matched paths. The supported override set is the `FeatureOverride` allowlist enum; the first entry is `enum_type:OPEN`, with `open_enums_in(&[...])` as shorthand: selected closed enums (or individual closed enum fields) generate as `EnumValue<E>`, making unknown wire values directly visible as `EnumValue::Unknown(n)` for prost-parity migrations or memory-optimized builds with `preserve_unknown_fields(false)`. Enum-type rules flow into the embedded reflection descriptor pool, so runtime reflection and dynamic JSON agree with the generated types. Rules that match nothing produce a generation-time warning. Default-off; existing output and semantics are unchanged. (#269)'
