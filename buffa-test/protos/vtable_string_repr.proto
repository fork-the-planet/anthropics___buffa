syntax = "proto3";

package vtable_string_repr;

// Built with `string_type(SmolStr)` + `reflect_mode(VTable)` to exercise the
// `ReflectElement for SmolStr` impl on the repeated-string element path. The
// owned `items` field is `Vec<SmolStr>`; singular `name` is `SmolStr` (reflects
// via deref, no `ReflectElement`); the map stays `String`-keyed/valued.
message Labels {
  string name = 1;
  repeated string items = 2;
  map<string, string> attrs = 3;
}
